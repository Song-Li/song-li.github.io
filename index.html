yours = [-75.1, 40];

function degreesToRadians(degrees) {
  return degrees * Math.PI / 180;
}

function distanceInKmBetweenEarthCoordinates(lat1, lon1, lat2, lon2) {
  var earthRadiusKm = 6371;

  var dLat = degreesToRadians(lat2-lat1);
  var dLon = degreesToRadians(lon2-lon1);

  lat1 = degreesToRadians(lat1);
  lat2 = degreesToRadians(lat2);

  var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.sin(dLon/2) * Math.sin(dLon/2) * Math.cos(lat1) * Math.cos(lat2); 
  var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
  return earthRadiusKm * c;
}

function rotateTo(p) {
  d3.transition()
    .duration(2500)
    .tween("rotate", function() {
      var r = d3.interpolate(projection.rotate(), [-p[0], -p[1]]);
      return function(t) {
        projection.rotate(r(t));
        svg.selectAll("path").attr("d", path)
      };
    })
  .each("end", function() {
    if (p[0] == yours[0] && p[1] == yours[1]) {
      $("#description").html("<center>You are here at " + your_city + "!</center>");
      setTimeout(rotateTo(hometown), 2000);
    }
    else if (p[0] == hometown[0] && p[1] == hometown[1]) {
      $("#description").html("<center>This is my HomeTown, " + my_hometown + "!</center>");
      setTimeout(rotateTo(mine), 2000);
    } else {
      var distance = distanceInKmBetweenEarthCoordinates(yours[1], yours[0], mine[1], mine[0]);
      $("#description").html("<center>I'm Here at " + my_city + "!<br />Your are " + Math.floor(distance) + "km away from me</center>");
    }
  })
}
function addMarks(locations) {
  //.datum({type: "mark", coordinates: [d[0], d[1]]})
  console.log(locations);
  locations.forEach(function(d){
    svg.append("path", ".foreground")
      .datum({type: "Point", coordinates: [d[0], d[1]]})
      .attr("class", "point")
      .attr("d", path);
  });
}

function getClientLocation() {
  $.getJSON("http://freegeoip.net/json/", function(data) {
    yours = [data['longitude'], data['latitude']];
    your_city = data['city'] + ', ' + data['country_name'];
    addMarks([yours, mine, hometown]);
    console.log(data);
    rotateTo(yours);
  });
}
var width = window.innerWidth,
    height = window.innerHeight,
    sens = 0.25,
    focused;

//Setting projection

  var projection = d3.geo.orthographic()
  .scale(width / 3)
  .rotate([116, 39])
.translate([width / 2, height - height / 3])
  .clipAngle(90);

var path = d3.geo.path()
  .projection(projection);

  //SVG container

  var svg = d3.select("body").append("svg")
  .attr("width", width)
  .attr("height", height);

  //Adding water

  svg.append("path")
  .datum({type: "Sphere"})
  .attr("class", "water")
  .attr("d", path);



queue()
  .defer(d3.json, "/world-110m.json")

  .await(ready);

  //Main function

function ready(error, world, countryData) {

    countries = topojson.feature(world, world.objects.countries).features;

  getClientLocation();


  var world = svg.selectAll("path.land")
    .data(countries)
    .enter().append("path")
    .attr("class", "land")
    .attr("d", path)

    for(var i = 0, l = cnt.length; i < l; i++) {
      if(cnt[i].id == sel.value) {return cnt[i];}
    }
  };

};
